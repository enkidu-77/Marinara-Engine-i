name: Build Android APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing vX.Y.Z release tag to attach APK to (leave blank for artifact-only build)"
        required: false
        type: string

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          gradle-version: "8.5"

      - name: Bootstrap Gradle wrapper
        working-directory: android
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x ./gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: locate
        working-directory: android
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          VERSION=$(node -p "require('../package.json').version")
          OUT_NAME="marinara-engine-${VERSION}.apk"
          cp "$APK_PATH" "$OUT_NAME"
          echo "apk=android/${OUT_NAME}" >> "$GITHUB_OUTPUT"
          echo "name=${OUT_NAME}" >> "$GITHUB_OUTPUT"
          ls -la "$OUT_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.locate.outputs.name }}
          path: ${{ steps.locate.outputs.apk }}

      - name: Attach APK to release
        if: github.event_name == 'release' || github.event.inputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          gh release upload "$TAG" "${{ steps.locate.outputs.apk }}" --clobber
